version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: auth_postgres
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_user_pass
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432" # 🔥 Changed here
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: auth_redis
    ports:
      - "6380:6379" # Optional: avoid local redis conflict

  app:
    build: .
    container_name: auth_app
    ports:
      - "4001:4001"
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  pgdata:
